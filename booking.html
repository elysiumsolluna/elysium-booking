<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment – ELYSIUM</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="site-header">
  <div class="logo">
    <a href="index.html"><img src="images/logo.png" alt="ELYSIUM Logo"></a>
  </div>
  <nav class="site-nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="products.html">Shop</a></li>
      <li><a href="booking.html" class="active">Book</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<section class="hero-small">
  <h1>Book Your Appointment</h1>
  <p>Cutting Edges, Day & Night</p>
</section>

<section class="booking-section">
  <div class="service-card sol">
    <h1>Sol - Men's Barbershop</h1>
    <p>Choose your service, barber, date, and time below:</p>
  </div>

  <form id="bookingForm">

    <label for="service">Choose Service</label>
    <select id="service" required>
      <option value="">Select a service</option>
      <option value="mens-haircut">Men’s Regular Haircut - 5 990 HUF</option>
      <option value="student-haircut">Student Haircut - 4 990 HUF</option>
      <option value="kids-haircut">Kids Haircut - 4 990 HUF</option>
      <option value="beard-trim">Beard Trim - 2 990 HUF</option>
      <option value="student-beard-trim">Student Beard Trim - 2 490 HUF</option>
      <option value="hair-beard">Hair + Beard - 7 990 HUF</option>
      <option value="student-hair-beard">Student Hair + Beard - 6 990 HUF</option>
      <option value="hair-beard-color">Haircut + Beard Trim + Color - 11 990 HUF</option>
      <option value="student-hair-beard-color">Student Haircut + Beard Trim + Color - 10 500 HUF</option>
    </select>

    <label for="barber">Choose Barber</label>
    <div class="barber-select-wrapper">
      <select id="barber" required>
        <option value="">Select a barber</option>
        <option value="moe">Moe Habibi</option>
        <option value="armani">Armani</option>
      </select>

      <div class="barber-photo">
        <img id="barberImage" src="images/default-barber.png" alt="Barber Photo">
      </div>
    </div>

    <label for="date">Select Date</label>
    <input type="date" id="date" required>

    <label for="time">Select Time</label>
    <select id="time" required></select>

    <label for="name">Your Name</label>
    <input type="text" id="name" required>

    <label for="email">Your Email</label>
    <input type="email" id="email" required>

    <button type="submit" class="cta-btn">Book Appointment</button>
  </form>

  <div id="confirmationMessage"></div>
</section>

<footer>
  <p>&copy; 2026 ELYSIUM – Sol & Luna</p>
</footer>

<script>
// Dates
const todayStr = new Date().toISOString().split('T')[0];
document.getElementById('date').setAttribute('min', todayStr);

// Time slots
function generateTimeSlots(selectId, startHour = 10, endHour = 22, intervalMinutes = 30) {
  const select = document.getElementById(selectId);
  select.innerHTML = '';
  let hour = startHour;
  let minute = 0;

  while(hour < endHour || (hour === endHour && minute === 0)) {
    const hh = hour.toString().padStart(2,'0');
    const mm = minute.toString().padStart(2,'0');

    const option = document.createElement('option');
    option.value = `${hh}:${mm}`;
    option.textContent = `${hh}:${mm}`;
    select.appendChild(option);

    minute += intervalMinutes;
    if(minute >= 60){
      minute = 0;
      hour++;
    }
  }
}

generateTimeSlots('time');

// Barber images
const barberSelect = document.getElementById('barber');
const barberImage = document.getElementById('barberImage');

const barberPhotos = {
  moe: 'images/barbers/moe.jpg',
  armani: 'images/barbers/armani.jpg'
};

barberSelect.addEventListener('change', () => {
  const selected = barberSelect.value;
  barberImage.src = barberPhotos[selected] || 'images/default-barber.png';
});

// Backend
const BACKEND_URL = 'https://elysiumsolluna.onrender.com';
const API_BASE = window.location.hostname.includes('onrender.com')
  ? window.location.origin
  : BACKEND_URL;

// Booking
const bookingForm = document.getElementById('bookingForm');
const bookingConfirmation = document.getElementById('confirmationMessage');

bookingForm.addEventListener('submit', async e => {
  e.preventDefault();

  const data = {
    service: document.getElementById('service').value,
    barber: barberSelect.value,
    date: document.getElementById('date').value,
    time: document.getElementById('time').value,
    name: document.getElementById('name').value,
    email: document.getElementById('email').value
  };

  try {
    const res = await fetch(`${API_BASE}/book`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });

    const result = await res.json();

    if (!res.ok) {
      bookingConfirmation.innerHTML = `<p style="color:red">${result.message}</p>`;
      return;
    }

    bookingConfirmation.innerHTML = `<p style="color:green">Booking confirmed!</p>`;
    bookingForm.reset();
    barberImage.src = 'images/default-barber.png';

  } catch (err) {
    bookingConfirmation.innerHTML = `<p style="color:red">Server error</p>`;
  }
});
</script>

</body>
</html>
