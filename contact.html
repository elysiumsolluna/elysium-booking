<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – ELYSIUM</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Header / Navigation -->
  <header class="site-header">
    <div class="logo">
      <a href="index.html">
        <img src="images/logo.png" alt="ELYSIUM Logo">
      </a>
    </div>
    <nav class="site-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="products.html">Shop</a></li>
        <li><a href="booking.html">Book</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero-small">
    <h1>Contact ELYSIUM</h1>
  </section>

  <!-- Contact Section -->
  <section class="contact-section">

    <!-- Contact Cards -->
    <div class="contact-container">
      <div class="contact-card">
        <i class="fa-solid fa-phone"></i>
        <h3>Phone</h3>
        <a href="tel:+36201234567"><i class="fa-solid fa-arrow-right"></i> +36 20 123 4567</a>
      </div>

      <div class="contact-card">
        <i class="fa-solid fa-envelope"></i>
        <h3>Email</h3>
        <a href="mailto:elysiumsolluna@gmail.com"><i class="fa-solid fa-arrow-right"></i> elysiumsolluna@gmail.com</a>
      </div>

      <div class="contact-card">
        <i class="fa-brands fa-instagram"></i>
        <h3>Instagram</h3>
        <a href="https://www.instagram.com/elysium_solluna/" target="_blank"><i class="fa-solid fa-arrow-right"></i> @elysium_solluna</a>
      </div>

      <div class="contact-card">
        <i class="fa-brands fa-facebook"></i>
        <h3>Facebook</h3>
        <a href="https://www.facebook.com/profile.php?id=61585067441826" target="_blank"><i class="fa-solid fa-arrow-right"></i> ELYSIUM Sol & Luna</a>
      </div>

      <div class="contact-card">
        <i class="fa-solid fa-clock"></i>
        <h3>Opening Hours</h3>
        <p><i class="fa-solid fa-arrow-right"></i> Daily 10:00 AM — 10:00 PM</p>
      </div>
    </div>

    <!-- Google Maps -->
    <div class="map-container">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2686.648257509706!2d19.058!3d47.5071723!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4741dd0054b256ab%3A0xb63b313303ba6636!2sElysium%20Sol%26Luna!5e0!3m2!1sen!2shu!4v1678901234567!5m2!1sen!2shu"
        width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </div>

    <!-- Contact Form -->
    <div class="contact-form">
      <h2>Send Us a Message</h2>
      <form id="contactForm">
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="John Doe" required>

        <label for="email">Your Email</label>
        <input type="email" id="email" placeholder="example@email.com" required>

        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="Your message..." required></textarea>

        <button type="submit" class="cta-btn">Send Message</button>
      </form>
      <div id="contactConfirmation"></div>
    </div>

  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 ELYSIUM – Sol & Luna</p>
  </footer>

</body>
</html>
